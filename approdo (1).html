<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E6E6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Approdo">
<title>Approdo — Gestione appartamenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EAF0EE;
    --surface:#FFFFFF;
    --surface-2:#F5F8F7;
    --ink:#13303A;
    --ink-soft:#5E757C;
    --ink-faint:#90A3A8;
    --line:#DBE6E3;
    --brand:#0E6E6B;
    --brand-deep:#0A5552;
    --brand-tint:#E2F0EE;
    --arrival:#2E8E6B;
    --arrival-tint:#E4F2EC;
    --departure:#C7842B;
    --departure-tint:#F6ECD9;
    --coral:#E8654F;
    --coral-tint:#FBE6E1;
    --sand:#F3EBDD;
    --danger:#C7463A;
    --radius:18px;
    --radius-sm:12px;
    --shadow:0 1px 2px rgba(19,48,58,.04), 0 8px 24px rgba(19,48,58,.06);
    --shadow-lg:0 10px 40px rgba(19,48,58,.16);
    --maxw:480px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  input,select,textarea,button{font-family:inherit;font-size:16px;color:inherit}
  button{cursor:pointer;border:none;background:none}
  ::selection{background:var(--brand-tint)}

  /* ---------- App shell ---------- */
  #app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
  .shell{display:flex;flex-direction:column;min-height:100vh}
  .view{flex:1;padding:18px 18px 96px;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:40;
    background:rgba(234,240,238,.86);
    backdrop-filter:saturate(1.4) blur(12px);
    -webkit-backdrop-filter:saturate(1.4) blur(12px);
    border-bottom:1px solid var(--line);
    padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(150deg,var(--brand),var(--brand-deep));
    display:grid;place-items:center;color:#fff;flex:none;
    box-shadow:0 4px 12px rgba(14,110,107,.3);
  }
  .brand h1{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em}
  .brand span{display:block;font-family:'Inter';font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:-3px}
  .icon-btn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink-soft);background:var(--surface);box-shadow:var(--shadow)}
  .icon-btn:active{transform:scale(.94)}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:var(--maxw);z-index:40;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(5,1fr);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabs button{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;border-radius:12px;color:var(--ink-faint);
    font-size:10.5px;font-weight:600;letter-spacing:.01em;transition:color .15s;
  }
  nav.tabs button.active{color:var(--brand)}
  nav.tabs button.active svg{transform:translateY(-1px)}
  nav.tabs svg{transition:transform .2s}

  /* ---------- Typography helpers ---------- */
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
  .page-title{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1.05}
  .section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;letter-spacing:-.01em}
  .muted{color:var(--ink-soft)}
  .mono{font-family:'DM Mono',monospace}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .card+.card{margin-top:14px}

  /* ---------- Agenda hero ---------- */
  .hero{
    background:linear-gradient(155deg,#0F726F 0%,#0A5552 70%);
    color:#fff;border-radius:24px;padding:22px;position:relative;overflow:hidden;
    box-shadow:0 10px 30px rgba(10,85,82,.28);
  }
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
  .hero::before{content:"";position:absolute;right:-70px;bottom:-90px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
  .hero .date-big{font-family:'Fraunces',serif;font-size:42px;font-weight:600;line-height:1;letter-spacing:-.02em}
  .hero .date-sub{font-size:13px;font-weight:500;opacity:.85;text-transform:capitalize;margin-top:4px}
  .hero .occ{display:flex;gap:18px;margin-top:18px;position:relative;z-index:1}
  .hero .occ .stat .n{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;line-height:1}
  .hero .occ .stat .l{font-size:11px;opacity:.8;margin-top:2px}

  /* ---------- Board (tabellone) ---------- */
  .board-head{display:flex;align-items:center;gap:8px;margin:24px 2px 12px}
  .board-head .section-title{flex:1}
  .board-group{margin-bottom:6px}
  .board-label{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin:14px 2px 8px;color:var(--ink-soft)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dot.arr{background:var(--arrival)}
  .dot.dep{background:var(--departure)}
  .dot.stay{background:var(--brand)}

  .brow{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);margin-bottom:8px;
    transition:transform .12s;cursor:pointer;border-left:4px solid transparent;
  }
  .brow:active{transform:scale(.985)}
  .brow .chip{width:10px;height:38px;border-radius:5px;flex:none}
  .brow .bmain{flex:1;min-width:0}
  .brow .bname{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .bsub{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
  .brow .btime{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;text-align:right;flex:none}
  .brow .btime .lbl{display:block;font-family:'Inter';font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:1px}
  .flag{font-size:13px}

  /* ---------- Mini cards row ---------- */
  .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .mini{background:var(--surface);border-radius:16px;padding:15px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
  .mini:active{transform:scale(.97)}
  .mini .mtop{display:flex;align-items:center;justify-content:space-between;color:var(--ink-faint)}
  .mini .mn{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;margin-top:8px;line-height:1}
  .mini .ml{font-size:12px;color:var(--ink-soft);margin-top:3px}

  /* ---------- List items ---------- */
  .list-item{
    display:flex;align-items:center;gap:13px;background:var(--surface);
    border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px;
    cursor:pointer;transition:transform .12s;
  }
  .list-item:active{transform:scale(.985)}
  .li-chip{width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;font-family:'Fraunces',serif}
  .li-main{flex:1;min-width:0}
  .li-title{font-weight:600;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li-sub{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .li-side{text-align:right;flex:none}
  .chev{color:var(--ink-faint);flex:none}

  /* ---------- Badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
  .b-paid{background:var(--arrival-tint);color:#1f6b4f}
  .b-partial{background:var(--departure-tint);color:#9a6315}
  .b-pending{background:var(--coral-tint);color:#b53e2c}
  .b-in{background:var(--brand-tint);color:var(--brand-deep)}
  .b-out{background:var(--surface-2);color:var(--ink-soft)}
  .b-conf{background:var(--brand-tint);color:var(--brand-deep)}

  /* ---------- Filter pills ---------- */
  .pills{display:flex;gap:8px;margin:4px 0 16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{white-space:nowrap;padding:8px 15px;border-radius:999px;background:var(--surface);box-shadow:var(--shadow);font-size:13.5px;font-weight:600;color:var(--ink-soft)}
  .pill.active{background:var(--ink);color:#fff}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:15px;padding:14px 20px;border-radius:14px;transition:transform .12s,opacity .15s;width:100%}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(14,110,107,.28)}
  .btn-ghost{background:var(--surface-2);color:var(--ink)}
  .btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
  .btn-danger{background:transparent;color:var(--danger);font-weight:600}
  .btn-sm{padding:10px 14px;font-size:13.5px;width:auto;border-radius:11px}

  .fab{
    position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));z-index:35;
    left:50%;transform:translateX(calc(var(--maxw)/2 - 50% - 18px));
    width:auto;
  }
  @media(max-width:516px){.fab{left:auto;right:18px;transform:none}}
  .fab button{
    background:var(--coral);color:#fff;border-radius:999px;padding:14px 20px;
    font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;
    box-shadow:0 8px 22px rgba(232,101,79,.4);
  }
  .fab button:active{transform:scale(.96)}

  /* ---------- Empty state ---------- */
  .empty{text-align:center;padding:40px 24px;color:var(--ink-soft)}
  .empty .ei{width:64px;height:64px;border-radius:20px;background:var(--brand-tint);display:grid;place-items:center;margin:0 auto 16px;color:var(--brand)}
  .empty h3{font-family:'Fraunces',serif;font-size:19px;color:var(--ink);margin-bottom:6px;font-weight:600}
  .empty p{font-size:14px;max-width:260px;margin:0 auto 18px}

  /* ---------- Modal / Sheet ---------- */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(19,48,58,.5);backdrop-filter:blur(2px);opacity:0;animation:ov .2s forwards;display:flex;align-items:flex-end;justify-content:center}
  @keyframes ov{to{opacity:1}}
  .sheet{
    background:var(--bg);width:100%;max-width:var(--maxw);max-height:92vh;
    border-radius:26px 26px 0 0;overflow-y:auto;transform:translateY(100%);
    animation:sheet .32s cubic-bezier(.2,.9,.25,1) forwards;
    -webkit-overflow-scrolling:touch;
  }
  @keyframes sheet{to{transform:translateY(0)}}
  .sheet-head{position:sticky;top:0;background:var(--bg);z-index:5;padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .sheet-head .grab{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:38px;height:4px;border-radius:2px;background:var(--line)}
  .sheet-head h2{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
  .sheet-body{padding:18px}

  /* ---------- Forms ---------- */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;letter-spacing:.01em}
  .field input,.field select,.field textarea{
    width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;
    background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
  .field textarea{resize:vertical;min-height:80px;line-height:1.5}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:13.5px;color:var(--ink-soft);transition:all .12s}
  .seg button.on{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-deep)}
  .color-row{display:flex;gap:10px;flex-wrap:wrap}
  .color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s}
  .color-dot.on{border-color:var(--ink);transform:scale(1.1)}

  /* ---------- Detail blocks ---------- */
  .detail-hero{border-radius:22px;padding:22px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
  .detail-hero::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12)}
  .detail-hero h2{font-family:'Fraunces',serif;font-size:26px;font-weight:600;position:relative;z-index:1}
  .detail-hero .dh-sub{opacity:.9;font-size:14px;margin-top:3px;position:relative;z-index:1}
  .info-row{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .info-row:last-child{border-bottom:none}
  .info-row .ir-ico{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;color:var(--brand);flex:none}
  .info-row .ir-k{font-size:11.5px;color:var(--ink-faint);font-weight:600;letter-spacing:.02em}
  .info-row .ir-v{font-size:15px;font-weight:500;margin-top:1px;word-break:break-word}
  .info-row a.ir-v{color:var(--brand);text-decoration:none}

  .block-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:22px 2px 10px}

  .guest-card{background:var(--surface-2);border-radius:13px;padding:13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .guest-card .gc-name{font-weight:600;font-size:14.5px}
  .guest-card .gc-meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5}

  /* ---------- Translator ---------- */
  .lang-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:8px}
  .lang-btn{padding:11px 6px;border-radius:13px;border:1.5px solid var(--line);background:var(--surface);font-weight:600;font-size:13px;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .12s}
  .lang-btn.on{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-deep)}
  .lang-btn .lf{font-size:20px}
  .trans-out{background:var(--surface);border-radius:14px;padding:16px;margin-top:14px;box-shadow:var(--shadow);min-height:70px;position:relative;border:1px solid var(--line)}
  .trans-out .to-txt{font-size:15.5px;line-height:1.55;white-space:pre-wrap}
  .trans-out .to-copy{position:absolute;top:10px;right:10px}

  .tmpl-card{background:var(--surface);border-radius:15px;padding:15px;box-shadow:var(--shadow);margin-bottom:11px}
  .tmpl-card .tc-title{font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .tmpl-card .tc-cat{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);background:var(--brand-tint);padding:3px 8px;border-radius:6px}
  .tmpl-card .tc-body{font-size:13.5px;color:var(--ink-soft);margin-top:8px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .tmpl-actions{display:flex;gap:8px;margin-top:12px}

  /* ---------- Auth ---------- */
  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;max-width:var(--maxw);margin:0 auto}
  .auth-brand{text-align:center;margin-bottom:34px}
  .auth-brand .mark{width:64px;height:64px;border-radius:20px;background:linear-gradient(150deg,var(--brand),var(--brand-deep));display:grid;place-items:center;color:#fff;margin:0 auto 16px;box-shadow:0 10px 30px rgba(14,110,107,.35)}
  .auth-brand h1{font-family:'Fraunces',serif;font-size:34px;font-weight:600;letter-spacing:-.02em}
  .auth-brand p{color:var(--ink-soft);font-size:14.5px;margin-top:4px}
  .auth-card{background:var(--surface);border-radius:22px;padding:24px;box-shadow:var(--shadow-lg)}
  .auth-switch{text-align:center;margin-top:18px;font-size:14px;color:var(--ink-soft)}
  .auth-switch button{color:var(--brand);font-weight:600}
  .auth-err{background:var(--coral-tint);color:#b53e2c;padding:11px 14px;border-radius:11px;font-size:13.5px;margin-bottom:14px;display:none}

  /* ---------- Toast ---------- */
  #toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:all .3s;pointer-events:none;max-width:90%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Spinner ---------- */
  .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite}
  .spin.dark{border-color:var(--line);border-top-color:var(--brand)}
  @keyframes rot{to{transform:rotate(360deg)}}
  .loader-full{min-height:100vh;display:grid;place-items:center}

  .pay-bar{height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin-top:10px}
  .pay-bar i{display:block;height:100%;background:var(--arrival);border-radius:99px;transition:width .4s}

  .row-actions{display:flex;gap:10px;margin-top:8px}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .hint{font-size:12.5px;color:var(--ink-faint);margin-top:6px;line-height:1.45}
</style>
</head>
<body>
<div id="app"><div class="loader-full"><div class="spin dark"></div></div></div>
<div id="toast"></div>

<script>
/* Watchdog: se l'app non parte entro 7s (es. anteprima isolata / file aperto in locale), mostra un messaggio invece della rotella infinita */
window.__approdoBooted=false;
window.addEventListener('load',function(){
  setTimeout(function(){
    if(window.__approdoBooted) return;
    var inIframe=false; try{inIframe=window.self!==window.top;}catch(e){inIframe=true;}
    var msg = inIframe
      ? "Stai vedendo l'<b>anteprima dentro Claude</b>, che non può collegarsi a Firebase.<br><br>Per usarla davvero, carica <b>approdo.html</b> su <b>GitHub Pages</b> e aprilo da lì."
      : "Impossibile collegarsi a Firebase. Controlla la connessione e ricarica.<br><br>Se hai aperto il file con doppio clic (file://) non funziona: serve GitHub Pages o un server locale.";
    document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:Inter,system-ui,sans-serif;color:#13303A"><div style="max-width:330px"><div style="width:62px;height:62px;border-radius:18px;background:#E2F0EE;display:grid;place-items:center;margin:0 auto 18px;font-size:30px">⚓</div><div style="font-family:Fraunces,Georgia,serif;font-size:21px;font-weight:600;margin-bottom:10px">Apri Approdo online</div><div style="font-size:14.5px;line-height:1.65;color:#5E757C">'+msg+'</div></div></div>';
  },7000);
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

let unsubs=[];
function startListeners(){
  stopListeners();
  const cols=[
    ['apartments', query(collection(db,'apartments'), orderBy('createdAt','asc'))],
    ['bookings', query(collection(db,'bookings'), orderBy('checkIn','asc'))],
    ['ferries', collection(db,'ferries')],
    ['templates', collection(db,'templates')],
  ];
  cols.forEach(([key,q])=>{
    const u=onSnapshot(q, snap=>{
      S[key]=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.ready[key]=true;
      if(allReady()) render();
    }, err=>{ console.error(key,err); S.ready[key]=true; if(allReady()) render(); });
    unsubs.push(u);
  });
}
function stopListeners(){ unsubs.forEach(u=>u()); unsubs=[]; Object.keys(S.ready).forEach(k=>S.ready[k]=false); }
function allReady(){ return Object.values(S.ready).every(Boolean); }

async function doLogin(email,pass){ return signInWithEmailAndPassword(auth,email,pass); }
async function doRegister(email,pass){ return createUserWithEmailAndPassword(auth,email,pass); }

function renderAuth(){
  const isLogin = S.authMode==='login';
  $('app').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-brand">
        <div class="mark">${icon('ship',32)}</div>
        <h1>Approdo</h1>
        <p>Gestione appartamenti</p>
      </div>
      <div class="auth-card">
        <div class="auth-err" id="authErr"></div>
        <div class="field">
          <label>Email</label>
          <input id="authEmail" type="email" inputmode="email" autocomplete="email" placeholder="nome@esempio.it">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="authPass" type="password" autocomplete="${isLogin?'current-password':'new-password'}" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="authBtn">${isLogin?'Accedi':'Crea account'}</button>
      </div>
      <div class="auth-switch">
        ${isLogin?'Non hai un account?':'Hai già un account?'}
        <button id="authSwitch">${isLogin?'Registrati':'Accedi'}</button>
      </div>
    </div>`;
  $('authSwitch').onclick=()=>{ S.authMode=isLogin?'register':'login'; renderAuth(); };
  $('authBtn').onclick=async()=>{
    const email=$('authEmail').value.trim(), pass=$('authPass').value;
    const err=$('authErr');
    err.style.display='none';
    if(!email||!pass){ err.textContent='Inserisci email e password.'; err.style.display='block'; return; }
    if(pass.length<6){ err.textContent='La password deve avere almeno 6 caratteri.'; err.style.display='block'; return; }
    const btn=$('authBtn'); btn.innerHTML='<div class="spin"></div>'; btn.disabled=true;
    try{
      if(isLogin) await doLogin(email,pass); else await doRegister(email,pass);
    }catch(e){
      const map={
        'auth/invalid-email':'Email non valida.',
        'auth/user-not-found':'Nessun account con questa email.',
        'auth/wrong-password':'Password errata.',
        'auth/invalid-credential':'Email o password errate.',
        'auth/email-already-in-use':'Questa email è già registrata. Accedi.',
        'auth/weak-password':'Password troppo debole (min. 6 caratteri).',
        'auth/network-request-failed':'Errore di rete. Controlla la connessione.',
      };
      err.textContent = map[e.code] || 'Errore. Riprova.';
      err.style.display='block';
      btn.innerHTML=isLogin?'Accedi':'Crea account'; btn.disabled=false;
    }
  };
  ['authEmail','authPass'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('authBtn').click();}));
}

function viewAgenda(){
  const t=todayStr();
  const d=new Date();
  const arrivals=S.bookings.filter(b=>b.checkIn===t && b.status!=='cancelled');
  const departures=S.bookings.filter(b=>b.checkOut===t && b.status!=='cancelled');
  const staying=S.bookings.filter(b=>b.checkIn<t && b.checkOut>t && b.status!=='cancelled');
  const occupiedNow=S.bookings.filter(b=>b.checkIn<=t && b.checkOut>t && b.status!=='cancelled');
  const occupiedApts=new Set(occupiedNow.map(b=>b.apartmentId)).size;
  const totApts=S.apartments.length;

  let board='';
  if(arrivals.length){
    board+=`<div class="board-label"><span class="dot arr"></span>Arrivi oggi · ${arrivals.length}</div>`;
    board+=arrivals.map(b=>browHTML(b,'in')).join('');
  }
  if(departures.length){
    board+=`<div class="board-label"><span class="dot dep"></span>Partenze oggi · ${departures.length}</div>`;
    board+=departures.map(b=>browHTML(b,'out')).join('');
  }
  if(staying.length){
    board+=`<div class="board-label"><span class="dot stay"></span>In struttura · ${staying.length}</div>`;
    board+=staying.map(b=>browHTML(b,'stay')).join('');
  }
  if(!board){
    board=`<div class="card" style="text-align:center;padding:28px 20px;color:var(--ink-soft)">
      <div style="color:var(--brand);margin-bottom:8px">${icon('check',28)}</div>
      <div style="font-weight:600;color:var(--ink)">Nessun movimento oggi</div>
      <div style="font-size:13.5px;margin-top:4px">Nessun arrivo o partenza in programma.</div>
    </div>`;
  }

  const nextFerry = S.ferries[0];

  return `
    <div class="hero">
      <div class="date-big">${d.getDate()} ${MONTHS[d.getMonth()]}</div>
      <div class="date-sub">${WEEKDAYS[d.getDay()]} ${d.getFullYear()}</div>
      <div class="occ">
        <div class="stat"><div class="n">${occupiedApts}/${totApts||0}</div><div class="l">Appartamenti occupati</div></div>
        <div class="stat"><div class="n">${arrivals.length}</div><div class="l">Arrivi</div></div>
        <div class="stat"><div class="n">${departures.length}</div><div class="l">Partenze</div></div>
      </div>
    </div>

    <div class="board-head"><div class="section-title">Tabellone di oggi</div></div>
    ${board}

    <div class="mini-grid">
      <div class="mini" data-go="prenotazioni">
        <div class="mtop"><span style="font-size:12px;font-weight:600">Prenotazioni</span>${icon('calendar',18)}</div>
        <div class="mn">${S.bookings.filter(b=>b.status!=='cancelled').length}</div>
        <div class="ml">totali attive</div>
      </div>
      <div class="mini" data-go="nave">
        <div class="mtop"><span style="font-size:12px;font-weight:600">Orari nave</span>${icon('ship',18)}</div>
        ${nextFerry
          ? `<div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:500;margin-top:8px">${esc(nextFerry.departureTime||'—')}</div><div class="ml">${esc(nextFerry.route||'prossima tratta')}</div>`
          : `<div class="mn">—</div><div class="ml">aggiungi orari</div>`}
      </div>
    </div>`;
}
function browHTML(b,kind){
  const time = kind==='out' ? (b.checkOutTime||'') : (b.checkInTime||'');
  const lbl = kind==='out'?'Check-out':kind==='in'?'Check-in':'In casa';
  const sub = kind==='stay'
    ? `${esc(aptName(b.apartmentId))} · fino al ${fmtDateShort(b.checkOut)}`
    : `${esc(aptName(b.apartmentId))}`;
  return `<div class="brow" data-booking="${b.id}">
    <div class="chip" style="background:${aptColor(b.apartmentId)}"></div>
    <div class="bmain">
      <div class="bname">${esc(b.guestName||'Ospite')} ${b.guestLanguage&&b.guestLanguage!=='it'?`<span class="flag">${langFlag(b.guestLanguage)}</span>`:''}</div>
      <div class="bsub">${sub}</div>
    </div>
    <div class="btime"><span class="lbl">${lbl}</span>${time?esc(time):'<span style="color:var(--ink-faint)">—</span>'}</div>
  </div>`;
}

/* ====================== BOOKINGS ====================== */
function viewBookings(){
  const t=todayStr();
  const active=S.bookings.filter(b=>b.status!=='cancelled');
  let list;
  if(S.filter==='oggi') list=active.filter(b=>b.checkIn===t||b.checkOut===t||(b.checkIn<t&&b.checkOut>t));
  else if(S.filter==='prossime') list=active.filter(b=>b.checkOut>=t).sort((a,b)=>a.checkIn.localeCompare(b.checkIn));
  else if(S.filter==='passate') list=active.filter(b=>b.checkOut<t).sort((a,b)=>b.checkIn.localeCompare(a.checkIn));
  else list=active.slice().sort((a,b)=>a.checkIn.localeCompare(b.checkIn));

  const pills=[['prossime','Prossime'],['oggi','Oggi'],['tutte','Tutte'],['passate','Passate']];
  let body;
  if(!S.apartments.length){
    body=emptyState('key','Aggiungi prima un appartamento','Per creare prenotazioni servono gli appartamenti di tua madre.','Vai a Case','go-case');
  } else if(!list.length){
    body=emptyState('calendar','Nessuna prenotazione','Tocca il pulsante + per aggiungere la prima prenotazione.',null,null);
  } else {
    body=list.map(b=>bookingItem(b,t)).join('');
  }

  return `
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px">
      <div><div class="eyebrow">Calendario</div><div class="page-title">Prenotazioni</div></div>
    </div>
    <div class="pills">${pills.map(([k,l])=>`<div class="pill ${S.filter===k?'active':''}" data-filter="${k}">${l}</div>`).join('')}</div>
    ${body}
    <div class="fab"><button data-new-booking>${icon('plus',20)} Prenotazione</button></div>`;
}
function bookingItem(b,t){
  const nights=nightsBetween(b.checkIn,b.checkOut);
  let statusBadge='';
  if(b.checkIn<=t&&b.checkOut>t) statusBadge=`<span class="badge b-in">In casa</span>`;
  else if(b.checkOut<t) statusBadge=`<span class="badge b-out">Conclusa</span>`;
  else statusBadge=`<span class="badge b-conf">In arrivo</span>`;
  const pay=payBadge(b);
  return `<div class="list-item" data-booking="${b.id}">
    <div class="li-chip" style="background:${aptColor(b.apartmentId)}">${esc((b.guestName||'O').trim().charAt(0).toUpperCase())}</div>
    <div class="li-main">
      <div class="li-title">${esc(b.guestName||'Ospite')} ${b.guestLanguage&&b.guestLanguage!=='it'?langFlag(b.guestLanguage):''}</div>
      <div class="li-sub">${esc(aptName(b.apartmentId))} · ${fmtDateShort(b.checkIn)}–${fmtDateShort(b.checkOut)} · ${nights} ${nights===1?'notte':'notti'}</div>
      <div style="display:flex;gap:6px;margin-top:7px">${statusBadge}${pay}</div>
    </div>
    <div class="chev">${icon('chevron',18)}</div>
  </div>`;
}
function payBadge(b){
  const st=b.paymentStatus||'pending';
  if(st==='paid') return `<span class="badge b-paid">Saldato</span>`;
  if(st==='partial') return `<span class="badge b-partial">Acconto</span>`;
  return `<span class="badge b-pending">Da pagare</span>`;
}

      <div class="seg" id="f_paystatus">
        <button type="button" data-v="pending" class="${ps==='pending'?'on':''}">Da pagare</button>
        <button type="button" data-v="partial" class="${ps==='partial'?'on':''}">Acconto</button>

      try{ await deleteDoc(doc(db,'bookings',existing.id)); toast('Prenotazione eliminata'); closeSheet(); }

/* ----- Booking detail ----- */

    const cg=$('copyGuide'); if(cg) cg.onclick=()=>{ navigator.clipboard?.writeText(guideUrl); toast('Link copiato'); };

      window.open('https://wa.me/'+num+'?text='+encodeURIComponent(fn(((b.guestName||'').split(' ')[0]||''),guideUrl)),'_blank');

  $('addGuest').onclick=()=>guestForm(b,null);

  });

    await updateDoc(doc(db,'bookings',b.id),{feedback:$('fbText').value.trim()}); toast('Feedback salvato');
  };
}

async function translateText(text, target){
  const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=it|${target}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('net');
  const data=await res.json();
  if(data.responseStatus && data.responseStatus!==200 && !data.responseData) throw new Error('api');
  return data.responseData.translatedText;
}

function emptyState(ic,title,desc,btnLabel,action){
  return `<div class="empty">
    <div class="ei">${icon(ic,30)}</div>

    <p>${desc}</p>
    ${btnLabel?`<button class="btn btn-primary" style="width:auto;display:inline-flex" data-action="${action}">${btnLabel}</button>`:''}
  </div>`;

function shade(hex,percent){
  const n=parseInt(hex.replace('#',''),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+Math.round(255*percent/100)));
  g=Math.max(0,Math.min(255,g+Math.round(255*percent/100)));
  b=Math.max(0,Math.min(255,b+Math.round(255*percent/100)));
  return `#${((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}`;
}

/* ====================== GUEST GUIDE (pubblica) ====================== */
function guideBase(){ return location.origin + location.pathname; }

async function shareLink(url,title){
  try{ if(navigator.share){ await navigator.share({title:title||'Approdo',url}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  try{ await navigator.clipboard.writeText(url); toast('Link copiato negli appunti'); }
  catch(e){ prompt('Copia il link:',url); }
}

function chunkText(text,max=440){
  const out=[];
  text.split('\n').forEach(line=>{
    if(line.length<=max){ out.push(line); return; }
    let rest=line;
    while(rest.length>max){
      let cut=rest.lastIndexOf('. ',max); if(cut<80) cut=rest.lastIndexOf(' ',max); if(cut<1) cut=max;
      out.push(rest.slice(0,cut+1)); rest=rest.slice(cut+1);
    }
    out.push(rest);
  });
  return out;
}
async function translateLong(text,target){
  const parts=chunkText(text);
  const res=[];
  for(const p of parts){ res.push(p.trim()? await translateText(p,target) : p); }
  return res.join('\n');
}

      </div>

      ${(g.address||g.mapsLink)?`<div class="card" style="margin-top:14px">
        ${g.address?`<div class="info-row" style="border-bottom:none;padding-top:0;${g.mapsLink?'padding-bottom:14px':'padding-bottom:0'}"><div class="ir-ico">${icon('pin',18)}</div><div style="flex:1"><div class="ir-k">${T.address.toUpperCase()}</div><div class="ir-v">${esc(g.address)}</div></div></div>`:''}
        ${g.mapsLink?`<a class="btn btn-primary" href="${esc(g.mapsLink)}" target="_blank" rel="noopener" style="text-decoration:none;margin-top:4px">${icon('map',18)} ${T.maps}</a>`:''}
      </div>`:''}

      ${instr?`<div class="block-title">${T.howto}</div><div class="card"><div style="font-size:14.5px;line-height:1.65;white-space:pre-wrap">${esc(instr)}</div>${lang!=='it'?`<div class="hint" style="margin-top:10px">${T.auto}</div>`:''}</div>`:''}

      ${(g.wifiName||g.wifiPassword)?`<div class="block-title">${T.wifi}</div><div class="card">
        ${g.wifiName?`<div class="info-row" style="padding-top:0;${g.wifiPassword?'':'border-bottom:none;padding-bottom:0'}"><div class="ir-ico">${icon('wifi',18)}</div><div style="flex:1"><div class="ir-k">${T.net.toUpperCase()}</div><div class="ir-v">${esc(g.wifiName)}</div></div></div>`:''}
        ${g.wifiPassword?`<div class="info-row" style="border-bottom:none;padding-bottom:0"><div class="ir-ico">${icon('key',18)}</div><div style="flex:1"><div class="ir-k">${T.pass.toUpperCase()}</div><div class="ir-v mono">${esc(g.wifiPassword)}</div></div></div>`:''}
      </div>`:''}

      ${ferries.length?`<div class="block-title">${T.ferry}</div>${ferries.map(f=>`<div class="list-item" style="cursor:default">
        <div class="li-chip" style="background:var(--brand)">${icon('ship',20)}</div>
        <div class="li-main"><div class="li-title">${esc(f.route||'')}</div><div class="li-sub">${esc(f.company||'')}${f.days?` · ${esc(f.days)}`:''}</div></div>
        <div class="li-side"><div class="mono" style="font-size:16px;font-weight:500">${esc(f.departureTime||'—')}</div>${f.arrivalTime?`<div class="mono" style="font-size:11px;color:var(--ink-faint)">→ ${esc(f.arrivalTime)}</div>`:''}</div>
      </div>`).join('')}`:''}

      ${g.contactPhone?`<div class="block-title">${T.contact}</div><div class="card"><div class="row-actions">
        <a class="btn btn-ghost" href="tel:${esc(g.contactPhone)}" style="text-decoration:none;flex:1">${icon('phone',18)} ${T.call}</a>
        <a class="btn btn-primary" href="https://wa.me/${num}" target="_blank" rel="noopener" style="text-decoration:none;flex:1">${icon('send',18)} ${T.wa}</a>
      </div></div>`:''}

      <div style="text-align:center;margin-top:28px;color:var(--ink-faint);font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px">${icon('ship',14)} Approdo</div>
    </div>
  </div>`;
}
</script>
</body>
</html>
